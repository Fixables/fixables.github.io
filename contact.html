  <!-- ── CONTACT SECTION ────────────────────────────────── -->
  <section id="contact" class="contact-section">
    <div class="container">
      <span class="section-label">Get in touch</span>
      <h1 class="section-title">Contact Me</h1>
      <p class="section-sub" style="margin-top: 0.5rem; margin-bottom: 0;">
        Open to opportunities, collaborations, and conversations.
      </p>
      <form
        action="https://formsubmit.co/andy.setiawan9910@gmail.com"
        method="POST"
        class="contact-form"
      >
        <div class="form-row">
          <input type="text"  name="name"  placeholder="Name"  required />
          <input type="email" name="email" placeholder="Email" required />
        </div>
        <textarea
          name="message"
          placeholder="Leave feedback, career opportunities, or say hello."
          required
        ></textarea>

        <!-- Spam protection -->
        <input type="text"   name="_honey"   style="display:none" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_next"    value="https://fixables.github.io/thank-you.html" />

        <button type="submit" class="btn btn-primary" style="align-self: flex-start;">
          Send Message &rarr;
        </button>
      </form>
    </div>
  </section>
