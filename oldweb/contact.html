    <!-- CONTACT SECTION (styled to match other pages) -->
    <section id="contact" class="contact-section">
      <div class="container">
        <h1 class="title">Contact Me</h1>
        <form
          action="https://formsubmit.co/andy.setiawan9910@gmail.com"
          method="POST"
          class="contact-form"
        >
          <!-- Name & Email row -->
          <div class="form-row">
            <input type="text" name="name" placeholder="Name" required />
            <input type="email" name="email" placeholder="Email" required />
          </div>

          <!-- Message field -->
          <textarea
            name="message"
            placeholder="Leave feedback, career opportunities, or say hello to me 😊"
            required
          ></textarea>

          <!-- Spam honeypot + redirect -->
          <input type="text" name="_honey" style="display: none" />
          <input type="hidden" name="_captcha" value="false" />
          <input
            type="hidden"
            name="_next"
            value="https://fixables.github.io//thank-you.html"
          />

          <!-- Styled submit button -->
          <button type="submit" class="btn btn-color-1">Send Message →</button>
        </form>
      </div>
    </section>

    <!-- SOCIALS FOOTER -->
    <footer id="footer-socials">
      <p class="footer-text">Find me here</p>
      <div class="footer-icons">
